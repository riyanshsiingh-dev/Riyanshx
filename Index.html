<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sandy's Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    header {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: green;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 5px;
    }

    .btn:hover {
      background: #218838;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #222;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  Sandy's Shop 🛍️
</header>

<div class="container">

  <!-- Product 1 -->
  <div class="card">
    <img src="https://i.ibb.co/KzFNMy7m/17751933796363132377393233599929.jpg">
    <h3>Notebook</h3>
    <p class="price">₹99</p>
    <button class="btn" onclick="orderWhatsApp('Notebook',99)">Order on WhatsApp</button>
  </div>

  <!-- Product 2 -->
  <div class="card">
    <img src="https://i.ibb.co/KzFNMy7m/17751933796363132377393233599929.jpg">
    <h3>Pen Pack</h3>
    <p class="price">₹49</p>
    <button class="btn" onclick="orderWhatsApp('Pen Pack',49)">Order on WhatsApp</button>
  </div>

  <!-- Product 3 -->
  <div class="card">
    <img src="https://i.ibb.co/KzFNMy7m/17751933796363132377393233599929.jpg">
    <h3>File Folder</h3>
    <p class="price">₹79</p>
    <button class="btn" onclick="orderWhatsApp('File Folder',79)">Order on WhatsApp</button>
  </div>

</div>

<footer>
  Contact: +918957872858
</footer>

<script>
  function orderWhatsApp(product, price) {
    let phone = "8957872858"; // 👉 replace with your number
    let message = `Hello, I want to order ${product} for ₹${price}`;
    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
  }
</script>

</body>
</html>
